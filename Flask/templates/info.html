<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Information about Arrhythmia Classification</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f172a, #1e293b, #334155);
    min-height: 100vh;
}

.navbar {
            padding: 18px 25px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

.navbar a {
            color: #e2e8f0;
            float: right;
            text-decoration: none;
            margin-left: 15px;
            padding: 10px 18px;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
}

.navbar a:hover {
            background: #06b6d4;
            color: white;
            transform: scale(1.05);
}

h1 {
    font-size: 80px;
    text-align: center;
    color: red;
}

h2 {
    font-size: 40px;
    text-align: center;
    color: blue;
}

.image-container {
    text-align: center;
}

.image-container img {
    width: 90%;
    max-width: 1000px;
    height: auto;
    margin: 15px 0;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="navbar">
    <a href="/upload">Predict</a>
    <a href="/info">Info</a>
    <a href="/about">Home</a>
    <div style="clear:both;"></div>
</div>

<h1>ECG</h1>
<h2>Electrocardiogram</h2>

<div class="image-container">

    <img src="{{ url_for('static', filename='normal.jpg') }}" title="Normal">

    <img src="{{ url_for('static', filename='vf.jpg') }}" title="Ventricular Fibrillation">

    <img src="{{ url_for('static', filename='pac.jpg') }}" title="Premature Atrial Contraction">

    <img src="{{ url_for('static', filename='pvc.jpg') }}" title="Premature Ventricular Contraction">

    <img src="{{ url_for('static', filename='rbbb.jpg') }}" title="Right Bundle Branch Block">

    <img src="{{ url_for('static', filename='lbbb.jpg') }}" title="Left Bundle Branch Block">

</div>

</body>
</html>
